<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞天气 - 天气看得见，心事说得出</title>
    <style>
        /* ================= Reset & Variables ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            color: #ffffff;
            /* 默认深色背景，防止加载闪烁 */
            background: #1a1a2e; 
        }

        /* ================= Background Animation Layers ================= */
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            transition: background 3s ease;
            overflow: hidden;
            perspective: 1000px;
        }
        
        /* 镜头光晕层 (Lens Flare) */
        #lens-flare-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 2s ease;
            mix-blend-mode: screen;
        }
        
        /* 雾气层 */
        #fog-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            background: 
                radial-gradient(ellipse at center, transparent 20%, rgba(255,255,255,0.4) 100%),
                linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.6) 100%);
            transition: opacity 3s ease;
            filter: blur(20px);
        }

        /* 闪电层 */
        #lightning-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ================= 天气元素动画 ================= */
        /* 太阳及光晕 */
        .sun-container {
            position: absolute;
            top: 10%;
            left: 20%;
            width: 150px;
            height: 150px;
            z-index: 1;
        }
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -60px;
            margin-left: -60px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 50% 50%, #FFFFFF 0%, #FFF5E1 30%, #FFD700 70%, #FF8C00 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px #FFD700, 
                0 0 150px #FF8C00, 
                0 0 300px rgba(255, 140, 0, 0.8),
                inset -10px -10px 20px rgba(255,140,0,0.5);
            animation: pulse 4s infinite alternate;
        }
        /* 真实阳光射线 */
        .sun-ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 400px; height: 400px;
            margin-top: -200px; margin-left: -200px;
            background: repeating-conic-gradient(
                from 0deg, 
                rgba(255, 255, 255, 0.4) 0deg 5deg, 
                transparent 5deg 15deg,
                rgba(255, 230, 150, 0.2) 15deg 20deg,
                transparent 20deg 35deg
            );
            border-radius: 50%;
            animation: spin 60s linear infinite;
            pointer-events: none;
            filter: blur(4px);
        }
        /* 光晕圆环 (Lens Flare components) */
        .flare-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            filter: blur(2px);
        }
        .flare-1 { width: 300px; height: 300px; top: 40%; left: 45%; border-color: rgba(150, 200, 255, 0.4); background: radial-gradient(circle, rgba(150,200,255,0.2) 0%, transparent 70%); }
        .flare-2 { width: 100px; height: 100px; top: 60%; left: 60%; border-color: rgba(255, 150, 200, 0.3); background: rgba(255, 150, 200, 0.1); }
        .flare-3 { width: 50px; height: 50px; top: 75%; left: 75%; background: rgba(200, 255, 150, 0.4); filter: blur(5px); border: none; }
        .flare-4 { width: 400px; height: 10px; top: 15%; left: -20%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); transform: rotate(-30deg); filter: blur(3px); }

        /* 月亮及陨石坑 */
        .moon-container {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 120px;
            height: 120px;
            z-index: 1;
        }
        .moon {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e0e0e0 40%, #a0a0a0 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 80px rgba(255,255,255,0.6), 
                0 0 150px rgba(200,220,255,0.3),
                inset -20px -20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: floatGently 10s ease-in-out infinite alternate;
        }
        /* 月亮表面纹理 */
        .moon::before {
            content: '';
            position: absolute;
            top: 25px; left: 25px; width: 25px; height: 25px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            box-shadow: 
                35px 20px 0 8px rgba(0,0,0,0.12), 
                15px 50px 0 -4px rgba(0,0,0,0.18), 
                55px 45px 0 4px rgba(0,0,0,0.1),
                -10px 40px 0 -5px rgba(0,0,0,0.15),
                40px -10px 0 -2px rgba(0,0,0,0.1);
            filter: blur(1px);
        }
        /* 月晕 */
        .moon-halo {
            position: absolute;
            top: 50%; left: 50%;
            margin-top: -150px; margin-left: -150px;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
            animation: pulse 6s infinite alternate;
        }

        /* 星空 */
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffffff, 0 0 20px rgba(255,255,255,0.5);
        }
        .shooting-star {
            position: absolute;
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,200,200,0.8) 20%, rgba(255,255,255,0) 100%);
            border-radius: 2px;
            transform: rotate(-45deg);
            animation: shooting 4s linear infinite;
            opacity: 0;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* 云层 - 体积云 */
        .cloud-group {
            position: absolute;
            animation: float 40s linear infinite;
            will-change: transform;
        }
        .cloud {
            position: absolute;
            background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
            border-radius: 100px;
            box-shadow: 
                inset -5px -10px 20px rgba(0,0,0,0.05), 
                0 15px 40px rgba(0,0,0,0.15);
            filter: blur(1px);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: linear-gradient(to bottom, #ffffff 0%, #e8e8e8 100%);
            border-radius: 50%;
        }
        .cloud::before {
            width: 60%; height: 160%;
            top: -70%; left: 15%;
            box-shadow: inset -5px 5px 15px rgba(255,255,255,0.5);
        }
        .cloud::after {
            width: 50%; height: 120%;
            top: -50%; right: 15%;
            box-shadow: inset 5px 5px 15px rgba(255,255,255,0.5);
        }
        /* 乌云/积雨云 */
        .dark-cloud {
            background: linear-gradient(to bottom, #7a8292 0%, #4a5262 100%) !important;
            box-shadow: 
                inset -5px -10px 20px rgba(0,0,0,0.4), 
                0 20px 50px rgba(0,0,0,0.6) !important;
        }
        .dark-cloud::before, .dark-cloud::after {
            background: linear-gradient(to bottom, #8a92a2 0%, #5a6272 100%) !important;
            box-shadow: inset -5px 5px 15px rgba(255,255,255,0.1) !important;
        }

        /* 真实的雨滴 */
        .raindrop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(200,230,255,0.6) 80%, rgba(255,255,255,0.9) 100%);
            border-radius: 50% 50% 2px 2px;
            will-change: transform, opacity;
        }
        /* 雨滴落地水花 */
        .splash {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 5px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
            animation: splashAnim 0.5s ease-out;
        }

        /* 真实的雪花 */
        .snowflake {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
            will-change: transform;
        }

        /* 霾/沙尘/烟雾 */
        .haze-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(200,180,150,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatGently 8s ease-in-out infinite alternate, spin 20s linear infinite;
            filter: blur(10px);
        }

        /* ================= Main UI Layout ================= */
        #app {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(3px); /* 轻微模糊增强玻璃质感 */
        }

        /* 右上角入口 */
        .future-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 20px;
            color: #ffffff;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .future-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 天气信息展示区 */
        .weather-info {
            text-align: center;
            margin-top: 8vh;
            width: 100%;
            max-width: 600px;
        }
        /* 左上角定位 */
        .location {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 1.2rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .temp-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 10px 0;
        }
        .temp {
            font-size: 9rem;
            font-weight: 600;
            line-height: 1;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.2);
        }
        .temp-unit {
            font-size: 3rem;
            margin-top: 15px;
            font-weight: 300;
        }
        .desc {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 400;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 生活指数 */
        .indices {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .index-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .index-item span:first-child {
            opacity: 0.8;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .index-item strong {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 树洞心事输入区 */
        .mind-hole {
            margin-bottom: 3vh;
            width: 100%;
            max-width: 500px;
        }
        .mind-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            opacity: 0.9;
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-color: rgba(255, 255, 255, 0.6);
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .submit-btn {
            background: #ffffff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.3s;
            margin-left: 10px;
            flex-shrink: 0;
            position: relative;
        }
        .submit-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        .submit-btn svg {
            width: 20px;
            height: 20px;
            fill: #333333;
        }

        /* 底部版权 */
        .footer {
            font-size: 0.8rem;
            opacity: 0.5;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        /* ================= Components ================= */
        /* 未来天气弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal.show .modal-content {
            transform: translateY(0);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .close-btn:hover {
            opacity: 1;
        }
        .modal-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
            font-weight: 500;
        }
        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .forecast-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .forecast-date { flex: 1; opacity: 0.9; }
        .forecast-weather { flex: 1; text-align: center; font-weight: 500; }
        .forecast-temp { flex: 1; text-align: right; opacity: 0.9; }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ================= Keyframes ================= */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes float {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(100vw); }
        }
        @keyframes rainFall {
            0% { transform: translateY(-10vh) rotate(15deg); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
        }
        @keyframes snowFall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
        @keyframes sway {
            0% { margin-left: -30px; }
            100% { margin-left: 30px; }
        }
        @keyframes floatGently {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(10px); }
        }
        @keyframes splashAnim {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0; }
        }
        @keyframes shooting {
            0% { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 0; }
            10% { transform: translate(-50px, 50px) rotate(-45deg) scale(1); opacity: 1; }
            30% { transform: translate(-300px, 300px) rotate(-45deg) scale(0.2); opacity: 0; }
            100% { opacity: 0; }
        }
        @keyframes flash {
            0%, 95%, 100% { opacity: 0; }
            96%, 98% { opacity: 0.9; }
            97% { opacity: 0; }
        }
        @keyframes flyAway {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            20% { transform: translate(-10px, 10px) scale(0.9) rotate(-10deg); opacity: 1; }
            100% { transform: translate(150px, -150px) scale(0.5) rotate(45deg); opacity: 0; }
        }
        .fly {
            animation: flyAway 1s forwards ease-in-out;
        }

        /* ================= Responsive ================= */
        @media (max-width: 600px) {
            .temp { font-size: 6.5rem; }
            .temp-unit { font-size: 2rem; margin-top: 10px; }
            .desc { font-size: 1.5rem; margin-bottom: 20px; }
            .indices {
                flex-wrap: wrap;
                gap: 15px;
                padding: 15px;
            }
            .index-item {
                flex: 0 0 45%; /* 手机端每行两个 */
                margin-bottom: 5px;
            }
            .future-btn {
                top: 20px;
                right: 20px;
                font-size: 0.9rem;
                padding: 8px 16px;
            }
            .location {
                top: 20px;
                left: 20px;
                font-size: 1rem;
                padding: 6px 12px;
            }
            #app { padding: 20px; }
            .weather-info { margin-top: 10vh; }
        }
    </style>
</head>
<body>
    <!-- 动态背景层 -->
    <div id="bg-layer"></div>
    
    <!-- 镜头光晕层 -->
    <div id="lens-flare-layer">
        <div class="flare-circle flare-1"></div>
        <div class="flare-circle flare-2"></div>
        <div class="flare-circle flare-3"></div>
        <div class="flare-circle flare-4"></div>
    </div>
    
    <!-- 雾气层 -->
    <div id="fog-layer"></div>
    
    <!-- 雷阵雨闪电层 -->
    <div id="lightning-layer"></div>

    <!-- 主体内容 -->
    <div id="app">
        <button class="future-btn" onclick="openModal()">未来天气</button>
        
        <div class="location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="loc-text">定位中...</span>
        </div>

        <div class="weather-info">
            <div class="temp-wrapper">
                <div class="temp" id="temp-val">--</div>
                <div class="temp-unit">°</div>
            </div>
            
            <div class="desc" id="weather-desc">获取中...</div>
            
            <div class="indices">
                <div class="index-item">
                    <span>体感温度</span>
                    <strong id="idx-comfort">--</strong>
                </div>
                <div class="index-item">
                    <span>紫外线</span>
                    <strong id="idx-uv">--</strong>
                </div>
                <div class="index-item">
                    <span>相对湿度</span>
                    <strong id="idx-humidity">--</strong>
                </div>
                <div class="index-item">
                    <span>风速</span>
                    <strong id="idx-wind">--</strong>
                </div>
            </div>
        </div>
        
        <div class="mind-hole">
            <div class="mind-title">今日心事</div>
            <div class="input-group">
                <input type="text" id="mind-input" placeholder="把心事说给树洞，安全不留痕" autocomplete="off">
                <button class="submit-btn" onclick="submitMind()" aria-label="发送">
                    <svg id="plane-icon" viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="footer">Designed and developed by XU PENGYUAN</div>
    </div>
    
    <!-- 未来天气弹窗 -->
    <div class="modal" id="forecast-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title">未来三天天气</div>
            <div id="forecast-list">
                <!-- 预报数据将通过 JS 动态注入 -->
                <div style="text-align: center; padding: 20px; opacity: 0.7;">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 提示框 -->
    <div class="toast" id="toast">树洞听到啦</div>

    <script>
        // 天气现象映射表 (Apple WeatherKit)
        const weatherkitConditionMap = {
            "Clear": "晴",
            "MostlyClear": "大部晴朗",
            "PartlyCloudy": "局部多云",
            "MostlyCloudy": "大部多云",
            "Cloudy": "阴",
            "Fog": "雾",
            "Haze": "霾",
            "Smoke": "烟雾",
            "Dust": "浮尘",
            "Windy": "大风",
            "Breezy": "微风",
            "Drizzle": "毛毛雨",
            "Rain": "雨",
            "Showers": "阵雨",
            "HeavyRain": "大雨",
            "Thunderstorm": "雷阵雨",
            "ScatteredThunderstorms": "局部雷阵雨",
            "IsolatedThunderstorms": "局部雷阵雨",
            "SevereThunderstorm": "强雷阵雨",
            "Snow": "雪",
            "HeavySnow": "大雪",
            "SnowShowers": "阵雪",
            "Flurries": "小雪",
            "Blizzard": "暴雪",
            "BlowingSnow": "吹雪",
            "FreezingDrizzle": "冻毛毛雨",
            "FreezingRain": "冻雨",
            "MixedRainAndSleet": "雨夹雪",
            "MixedRainAndSnow": "雨夹雪",
            "MixedSnowAndSleet": "雨夹雪",
            "Hail": "冰雹",
            "Hurricane": "飓风",
            "Tornado": "龙卷风",
            "TropicalStorm": "热带风暴",
            "Hot": "炎热",
            "Frigid": "严寒"
        };

        // 页面加载完成后初始化
        window.onload = () => {
            // 默认展示一个晴天背景
            updateBackground("Clear");
            getLocation();
            
            // 监听回车键提交心事
            document.getElementById('mind-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitMind();
                }
            });
        };

        // 1. 获取用户地理位置
        function getLocation() {
            window.hasLoadedData = false;
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const isHttps = window.location.protocol === 'https:';
            
            if (!isHttps && !isLocalhost && window.location.protocol !== 'file:') {
                console.warn("地理位置 API 需要 HTTPS 环境");
                handleLocationError();
                return;
            }

            if (navigator.geolocation) {
                const locationTimeout = setTimeout(() => {
                    console.warn("地理位置获取超时保护触发");
                    handleLocationError();
                }, 5000);

                navigator.geolocation.getCurrentPosition(
                    position => {
                        clearTimeout(locationTimeout);
                        if (window.hasLoadedData) return;
                        window.hasLoadedData = true;
                        
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        getCityName(lat, lon);
                        getWeatherData(lat, lon);
                    },
                    error => {
                        clearTimeout(locationTimeout);
                        console.warn("地理位置获取失败:", error.message);
                        handleLocationError();
                    },
                    { 
                        enableHighAccuracy: false,
                        timeout: 5000, 
                        maximumAge: 60000 
                    }
                );
            } else {
                console.warn("浏览器不支持地理位置");
                handleLocationError();
            }
        }
        
        // 处理定位失败的降级逻辑
        function handleLocationError() {
            // 降级使用北京坐标
            const defaultLat = 39.9042;
            const defaultLon = 116.4074;
            if (window.hasLoadedData) return;
            window.hasLoadedData = true;
            
            document.getElementById('loc-text').innerText = "北京市";
            getWeatherData(defaultLat, defaultLon);
        }

        // 2. 通过经纬度反查城市名称（使用免费的 OpenStreetMap Nominatim 接口）
        async function getCityName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`, {
                    headers: { 
                        'Accept-Language': 'zh-CN',
                    }
                });
                
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                
                const data = await res.json();
                if (data && data.address) {
                    const city = data.address.city || data.address.town || data.address.county || "未知城市";
                    const district = data.address.suburb || data.address.district || "";
                    document.getElementById('loc-text').innerText = district ? `${city} ${district}` : city;
                } else {
                    document.getElementById('loc-text').innerText = "未知位置";
                }
            } catch (e) {
                console.error("反查城市失败", e);
                document.getElementById('loc-text').innerText = "未知位置";
            }
        }

        // 3. 请求本地代理服务器获取天气数据
        async function getWeatherData(lat, lon) {
            try {
                console.log("Starting to fetch weather data for", lat, lon);
                
                // 请求本地 Node.js 服务器
                // 动态获取当前访问的域名和协议
                const host = window.location.hostname;
                const port = window.location.port;
                const protocol = window.location.protocol;
                
                // 尝试从前端直接调用 Apple WeatherKit，如果之前可以，说明原来可能没有走代理
                // 这里为了安全，建议仅用于测试或临时方案，因为会将 Private Key 暴露在前端
                const url = `https://weatherkit.apple.com/api/v1/weather/zh-CN/${lat}/${lon}?dataSets=currentWeather,forecastDaily`;
                
                // 为了兼容之前的工作方式，我们在这里回退到某种可能的前端直接请求方式
                // 或者你之前调用的是其他第三方的免费天气 API？
                
                // 由于目前代码里强制请求 /api/weather，这是后端的路由，所以在 GitHub Pages 绝对会 404
                // 我们暂时恢复为请求本地或你可能有的其他接口
                let baseUrl = '';
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    baseUrl = 'http://localhost:8000';
                }
                const fetchUrl = baseUrl ? `${baseUrl}/api/weather?lat=${lat}&lon=${lon}` : `/api/weather?lat=${lat}&lon=${lon}`;
                
                console.log("Requesting API:", fetchUrl);
                
                const response = await fetch(fetchUrl);
                
                console.log("Server API Response Status:", response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("Server API Error Response Body:", errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("Weather Data received successfully");
                
                // 渲染实时数据
                renderRealtimeUI(data.currentWeather);
                updateBackground(data.currentWeather.conditionCode);
                // 渲染未来预报
                renderForecastUI(data.forecastDaily);
                
            } catch (error) {
                console.error("API 返回错误详细信息:", error);
                document.getElementById('weather-desc').innerText = "服务暂不可用: " + error.message;
                renderMockForecastUI();
            }
        }

        // 渲染实时天气 UI
        function renderRealtimeUI(currentWeather) {
            document.getElementById('temp-val').innerText = Math.round(currentWeather.temperature);
            document.getElementById('weather-desc').innerText = weatherkitConditionMap[currentWeather.conditionCode] || currentWeather.conditionCode;
            
            document.getElementById('idx-comfort').innerText = Math.round(currentWeather.temperatureApparent) + "°";
            document.getElementById('idx-uv').innerText = currentWeather.uvIndex;
            document.getElementById('idx-humidity').innerText = Math.round(currentWeather.humidity * 100) + "%";
            document.getElementById('idx-wind').innerText = Math.round(currentWeather.windSpeed) + " km/h";
        }

        // 渲染未来三天预报 UI
        function renderForecastUI(forecastDaily) {
            const listContainer = document.getElementById('forecast-list');
            listContainer.innerHTML = "";
            const dayLabels = ["今天", "明天", "后天"];
            
            const days = forecastDaily.days || [];
            
            for (let i = 0; i < 3; i++) {
                if (!days[i]) break;
                
                const day = days[i];
                const condition = day.conditionCode;
                const tempMin = Math.round(day.temperatureMin);
                const tempMax = Math.round(day.temperatureMax);
                
                // 取日期 MM-DD
                const dateObj = new Date(day.forecastStart);
                const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                const dateNum = dateObj.getDate().toString().padStart(2, '0');
                const dateStr = `${month}-${dateNum}`;
                
                const html = `
                    <div class="forecast-item">
                        <div class="forecast-date">${dayLabels[i]} <span style="font-size:0.8em; opacity:0.7; margin-left:5px;">${dateStr}</span></div>
                        <div class="forecast-weather">${weatherkitConditionMap[condition] || condition}</div>
                        <div class="forecast-temp">${tempMin}° ~ ${tempMax}°</div>
                    </div>
                `;
                listContainer.innerHTML += html;
            }
        }

        // Mock 预报数据（兜底）
        function renderMockForecastUI() {
            const listContainer = document.getElementById('forecast-list');
            listContainer.innerHTML = `
                <div class="forecast-item"><div class="forecast-date">今天</div><div class="forecast-weather">多云</div><div class="forecast-temp">15° ~ 22°</div></div>
                <div class="forecast-item"><div class="forecast-date">明天</div><div class="forecast-weather">晴</div><div class="forecast-temp">18° ~ 25°</div></div>
                <div class="forecast-item"><div class="forecast-date">后天</div><div class="forecast-weather">小雨</div><div class="forecast-temp">14° ~ 19°</div></div>
            `;
        }

        // 4. 根据天气和时间更新动态背景
        function updateBackground(conditionCode) {
            const hour = new Date().getHours();
            const bgLayer = document.getElementById('bg-layer');
            const lightningLayer = document.getElementById('lightning-layer');
            const flareLayer = document.getElementById('lens-flare-layer');
            const fogLayer = document.getElementById('fog-layer');
            
            // 清空之前的特效
            bgLayer.innerHTML = ""; 
            lightningLayer.style.animation = "";
            flareLayer.style.opacity = "0";
            fogLayer.style.opacity = "0";
            fogLayer.innerHTML = "";
            
            let bgGradient = "";
            let isNight = false;
            
            // 判断时间段 (中午/白天、傍晚、深夜)
            if (hour >= 6 && hour < 17) {
                // 白天 (清晨到下午)
                bgGradient = "linear-gradient(135deg, #2b5876 0%, #4e4376 100%)"; // 稍微深邃一点的蓝
                if (conditionCode && conditionCode.toUpperCase().includes("CLEAR")) {
                    bgGradient = "linear-gradient(135deg, #1cb5e0 0%, #000046 100%)"; // 晴天更透亮
                }
            } else if (hour >= 17 && hour < 19) {
                // 傍晚 (黄昏)
                bgGradient = "linear-gradient(135deg, #ff4e50 0%, #f9d423 100%)";
            } else {
                // 深夜
                bgGradient = "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)";
                isNight = true;
            }
            bgLayer.style.background = bgGradient;
            
            const code = (conditionCode || "").toUpperCase();
            
            // 渲染具体天气特效
            if (code.includes("CLEAR")) {
                // 晴天
                if (!isNight) {
                    bgLayer.innerHTML += `
                        <div class="sun-container">
                            <div class="sun-ray"></div>
                            <div class="sun"></div>
                        </div>
                    `;
                    // 开启镜头光晕
                    flareLayer.style.opacity = "1";
                } else {
                    bgLayer.innerHTML += `
                        <div class="moon-container">
                            <div class="moon-halo"></div>
                            <div class="moon"></div>
                        </div>
                    `;
                    // 添加真实的星空
                    for(let i = 0; i < 100; i++) {
                        const x = Math.random() * 100;
                        const y = Math.random() * 100;
                        const delay = Math.random() * 5;
                        const size = Math.random() * 1.5 + 0.5;
                        const opacity = Math.random() * 0.8 + 0.2;
                        bgLayer.innerHTML += `<div class="star" style="top:${y}%; left:${x}%; width:${size}px; height:${size}px; opacity:${opacity}; animation: pulse ${Math.random()*3+2}s infinite alternate ${delay}s;"></div>`;
                    }
                    // 添加流星
                    for(let i = 0; i < 4; i++) {
                        const top = Math.random() * 40;
                        const right = Math.random() * 50 - 20;
                        const delay = Math.random() * 15;
                        const duration = Math.random() * 1.5 + 2.5;
                        bgLayer.innerHTML += `<div class="shooting-star" style="top:${top}%; right:${right}%; animation: shooting ${duration}s linear infinite ${delay}s;"></div>`;
                    }
                }
            } 
            else if (code.includes("CLOUD")) {
                // 多云 / 阴天
                const isDarkCloud = code === "CLOUDY" || code === "MOSTLYCLOUDY";
                if (isDarkCloud && !isNight) {
                    bgLayer.style.background = "linear-gradient(135deg, #4b5a6d 0%, #2c3e50 100%)";
                }
                
                // 渲染体积云
                for(let i = 0; i < 12; i++) {
                    const top = -10 + Math.random() * 50;
                    const delay = Math.random() * -40;
                    const duration = 30 + Math.random() * 40;
                    const scale = 0.6 + Math.random() * 1.5;
                    const opacity = isNight ? (Math.random() * 0.15 + 0.1) : (Math.random() * 0.4 + 0.5);
                    const zIndex = Math.floor(Math.random() * 10);
                    const cloudClass = isDarkCloud ? "cloud dark-cloud" : "cloud";
                    
                    bgLayer.innerHTML += `
                        <div class="cloud-group" style="top:${top}%; left:-40%; z-index:${zIndex}; animation: float ${duration}s linear infinite ${delay}s;">
                            <div class="${cloudClass}" style="width:200px; height:70px; opacity:${opacity}; transform:scale(${scale});"></div>
                        </div>
                    `;
                }
                
                // 如果只是部分多云，还能隐约看到太阳或月亮
                if (code === "PARTLYCLOUDY") {
                    if (!isNight) {
                        bgLayer.innerHTML += `<div class="sun-container" style="opacity: 0.5; z-index: -1; transform: scale(0.8);"><div class="sun"></div></div>`;
                    } else {
                        bgLayer.innerHTML += `<div class="moon-container" style="opacity: 0.5; z-index: -1; transform: scale(0.8);"><div class="moon"></div></div>`;
                    }
                }
            }
            
            // 雾、霾、沙尘
            if (code === "FOG" || code === "HAZE" || code === "SMOKE" || code === "DUST") {
                fogLayer.style.opacity = "1";
                if (!isNight) {
                    bgLayer.style.background = "linear-gradient(to bottom, #bdc3c7, #2c3e50)";
                }
                
                // 漂浮的颗粒
                for(let i = 0; i < 15; i++) {
                    const top = Math.random() * 100;
                    const left = Math.random() * 100;
                    const size = Math.random() * 200 + 100;
                    const delay = Math.random() * -20;
                    fogLayer.innerHTML += `<div class="haze-particle" style="top:${top}%; left:${left}%; width:${size}px; height:${size}px; animation-delay:${delay}s;"></div>`;
                }
            }
            
            if (code.includes("RAIN") || code.includes("SHOWERS") || code.includes("DRIZZLE") || code.includes("THUNDERSTORM") || code.includes("HAIL")) {
                // 雨天
                if (!isNight) {
                    bgLayer.style.background = "linear-gradient(135deg, #232526 0%, #414345 100%)";
                }
                
                // 乌云顶层
                for(let i = 0; i < 8; i++) {
                    bgLayer.innerHTML += `
                        <div class="cloud-group" style="top:${-10 + Math.random()*20}%; left:-40%; animation: float ${30+Math.random()*20}s linear infinite ${Math.random()*-30}s;">
                            <div class="cloud dark-cloud" style="width:250px; height:80px; opacity:0.8; transform:scale(${1+Math.random()});"></div>
                        </div>
                    `;
                }

                const rainIntensity = code.includes("HEAVY") || code.includes("THUNDERSTORM") ? 200 : 100;
                for(let i = 0; i < rainIntensity; i++) {
                    const left = Math.random() * 120 - 10;
                    const delay = Math.random() * 2;
                    const duration = 0.4 + Math.random() * 0.3;
                    const width = Math.random() * 1.5 + 1;
                    const height = Math.random() * 25 + 15;
                    const opacity = Math.random() * 0.4 + 0.3;
                    bgLayer.innerHTML += `
                        <div class="raindrop" style="top:-50px; left:${left}%; width:${width}px; height:${height}px; opacity:${opacity}; animation: rainFall ${duration}s linear infinite ${delay}s;"></div>
                        <div class="splash" style="left:${left}%; animation: splashAnim ${duration}s infinite ${delay + duration*0.9}s;"></div>
                    `;
                }
                // 雷雨闪电
                if (code.includes("THUNDERSTORM")) {
                    lightningLayer.style.animation = "flash 4s infinite";
                    bgLayer.style.background = "linear-gradient(135deg, #141e30, #243b55)";
                }
            }
            
            if (code.includes("SNOW") || code.includes("SLEET") || code.includes("BLIZZARD") || code.includes("FLURRIES")) {
                // 雪天
                if (!isNight) {
                    bgLayer.style.background = "linear-gradient(135deg, #74ebd5 0%, #9face6 100%)";
                }
                const snowIntensity = code.includes("HEAVY") || code.includes("BLIZZARD") ? 150 : 80;
                for(let i = 0; i < snowIntensity; i++) {
                    const left = Math.random() * 120 - 10;
                    const delay = Math.random() * 10;
                    const duration = 5 + Math.random() * 7;
                    const size = 3 + Math.random() * 6;
                    const opacity = Math.random() * 0.6 + 0.4;
                    const blur = Math.random() * 1.5;
                    const zIndex = Math.random() > 0.8 ? 5 : 1; // 偶尔有雪花飘在前面
                    
                    bgLayer.innerHTML += `
                        <div class="snowflake" style="top:-30px; left:${left}%; width:${size}px; height:${size}px; opacity:${opacity}; filter:blur(${blur}px); z-index:${zIndex}; animation: snowFall ${duration}s linear infinite ${delay}s, sway ${duration/2}s ease-in-out infinite alternate ${delay}s;"></div>
                    `;
                }
            }
        }

        // 5. 弹窗控制逻辑
        function openModal() {
            document.getElementById('forecast-modal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('forecast-modal').classList.remove('show');
        }
        // 点击弹窗外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('forecast-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // 6. 心事提交与动画
        let isSubmitting = false;
        function submitMind() {
            if (isSubmitting) return;
            const input = document.getElementById('mind-input');
            const text = input.value.trim();
            if (!text) return; // 为空不提交
            
            isSubmitting = true;
            const icon = document.getElementById('plane-icon');
            // 添加飞走动画类
            icon.classList.add('fly');
            
            // 动画执行结束后处理
            setTimeout(() => {
                showToast("树洞听到啦");
                input.value = "";
                // 移除动画类，恢复原位
                icon.classList.remove('fly');
                isSubmitting = false;
            }, 1000);
        }
        
        // 展现 Toast 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
