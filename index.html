<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞天气 - 天气看得见，心事说得出</title>
    <style>
        /* ================= Reset & Variables ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            color: #ffffff;
            /* 默认深色背景，防止加载闪烁 */
            background: #1a1a2e; 
        }

        /* ================= Background Animation Layers ================= */
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            transition: background 2s ease;
            overflow: hidden;
        }
        /* 闪电层 */
        #lightning-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* 天气元素动画 */
        .sun {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 100px;
            height: 100px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 60px #FFD700, 0 0 100px #FF8C00;
            animation: pulse 4s infinite alternate;
        }
        .sun::after {
            content: '';
            position: absolute;
            top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            animation: pulse 2s infinite alternate;
        }
        .moon {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 80px;
            height: 80px;
            background: #F4F6F0;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,255,255,0.8);
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            filter: blur(8px);
        }

        /* ================= Main UI Layout ================= */
        #app {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(3px); /* 轻微模糊增强玻璃质感 */
        }

        /* 右上角入口 */
        .future-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 20px;
            color: #ffffff;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .future-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 天气信息展示区 */
        .weather-info {
            text-align: center;
            margin-top: 8vh;
            width: 100%;
            max-width: 600px;
        }
        /* 左上角定位 */
        .location {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 1.2rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .temp-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 10px 0;
        }
        .temp {
            font-size: 9rem;
            font-weight: 600;
            line-height: 1;
            text-shadow: 2px 4px 15px rgba(0,0,0,0.2);
        }
        .temp-unit {
            font-size: 3rem;
            margin-top: 15px;
            font-weight: 300;
        }
        .desc {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 400;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 生活指数 */
        .indices {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .index-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .index-item span:first-child {
            opacity: 0.8;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .index-item strong {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 树洞心事输入区 */
        .mind-hole {
            margin-bottom: 3vh;
            width: 100%;
            max-width: 500px;
        }
        .mind-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            opacity: 0.9;
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-color: rgba(255, 255, 255, 0.6);
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .submit-btn {
            background: #ffffff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.3s;
            margin-left: 10px;
            flex-shrink: 0;
            position: relative;
        }
        .submit-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        .submit-btn svg {
            width: 20px;
            height: 20px;
            fill: #333333;
        }

        /* 底部版权 */
        .footer {
            font-size: 0.8rem;
            opacity: 0.5;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        /* ================= Components ================= */
        /* 未来天气弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal.show .modal-content {
            transform: translateY(0);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .close-btn:hover {
            opacity: 1;
        }
        .modal-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
            font-weight: 500;
        }
        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .forecast-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .forecast-date { flex: 1; opacity: 0.9; }
        .forecast-weather { flex: 1; text-align: center; font-weight: 500; }
        .forecast-temp { flex: 1; text-align: right; opacity: 0.9; }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ================= Keyframes ================= */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes float {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(100vw); }
        }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
        @keyframes flash {
            0%, 95%, 100% { opacity: 0; }
            96%, 98% { opacity: 0.8; }
            97% { opacity: 0; }
        }
        @keyframes flyAway {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            20% { transform: translate(-10px, 10px) scale(0.9) rotate(-10deg); opacity: 1; }
            100% { transform: translate(150px, -150px) scale(0.5) rotate(45deg); opacity: 0; }
        }
        .fly {
            animation: flyAway 1s forwards ease-in-out;
        }

        /* ================= Responsive ================= */
        @media (max-width: 600px) {
            .temp { font-size: 6.5rem; }
            .temp-unit { font-size: 2rem; margin-top: 10px; }
            .desc { font-size: 1.5rem; margin-bottom: 20px; }
            .indices {
                flex-wrap: wrap;
                gap: 15px;
                padding: 15px;
            }
            .index-item {
                flex: 0 0 45%; /* 手机端每行两个 */
                margin-bottom: 5px;
            }
            .future-btn {
                top: 20px;
                right: 20px;
                font-size: 0.9rem;
                padding: 8px 16px;
            }
            .location {
                top: 20px;
                left: 20px;
                font-size: 1rem;
                padding: 6px 12px;
            }
            #app { padding: 20px; }
            .weather-info { margin-top: 10vh; }
        }
    </style>
</head>
<body>
    <!-- 动态背景层 -->
    <div id="bg-layer"></div>
    
    <!-- 雷阵雨闪电层 -->
    <div id="lightning-layer"></div>

    <!-- 主体内容 -->
    <div id="app">
        <button class="future-btn" onclick="openModal()">未来天气</button>
        
        <div class="location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="loc-text">定位中...</span>
        </div>

        <div class="weather-info">
            <div class="temp-wrapper">
                <div class="temp" id="temp-val">--</div>
                <div class="temp-unit">°</div>
            </div>
            
            <div class="desc" id="weather-desc">获取中...</div>
            
            <div class="indices">
                <div class="index-item">
                    <span>舒适度</span>
                    <strong id="idx-comfort">--</strong>
                </div>
                <div class="index-item">
                    <span>紫外线</span>
                    <strong id="idx-uv">--</strong>
                </div>
                <div class="index-item">
                    <span>相对湿度</span>
                    <strong id="idx-humidity">--</strong>
                </div>
                <div class="index-item">
                    <span>风速</span>
                    <strong id="idx-wind">--</strong>
                </div>
            </div>
        </div>
        
        <div class="mind-hole">
            <div class="mind-title">今日心事</div>
            <div class="input-group">
                <input type="text" id="mind-input" placeholder="把心事说给树洞，安全不留痕" autocomplete="off">
                <button class="submit-btn" onclick="submitMind()" aria-label="发送">
                    <svg id="plane-icon" viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="footer">Designed and developed by XU PENGYUAN</div>
    </div>
    
    <!-- 未来天气弹窗 -->
    <div class="modal" id="forecast-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title">未来三天天气</div>
            <div id="forecast-list">
                <!-- 预报数据将通过 JS 动态注入 -->
                <div style="text-align: center; padding: 20px; opacity: 0.7;">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 提示框 -->
    <div class="toast" id="toast">树洞听到啦</div>

    <script>
        // 天气现象映射表 (Apple WeatherKit)
        const weatherKitMap = {
            "Clear": "晴",
            "MostlyClear": "大部晴朗",
            "PartlyCloudy": "多云",
            "MostlyCloudy": "大部多云",
            "Cloudy": "阴",
            "Breezy": "微风",
            "Windy": "大风",
            "Drizzle": "毛毛雨",
            "HeavyRain": "大雨",
            "Rain": "雨",
            "Showers": "阵雨",
            "Flurries": "阵雪",
            "HeavySnow": "大雪",
            "MixedRainAndSleet": "雨夹雪",
            "MixedRainAndSnow": "雨夹雪",
            "MixedRainFall": "降雨",
            "MixedSnowAndSleet": "雨夹雪",
            "ScatteredSnowShowers": "零星阵雪",
            "ScatteredShowers": "零星阵雨",
            "Sleet": "冰雨",
            "Snow": "雪",
            "SnowShowers": "阵雪",
            "Blizzard": "暴风雪",
            "BlowingSnow": "吹雪",
            "FreezingDrizzle": "冻毛毛雨",
            "FreezingRain": "冻雨",
            "Frigid": "严寒",
            "Hail": "冰雹",
            "Hot": "炎热",
            "Hurricane": "飓风",
            "IsolatedThunderstorms": "局部雷暴",
            "SevereThunderstorm": "强雷暴",
            "Thunderstorm": "雷暴",
            "ScatteredThunderstorms": "零星雷暴",
            "Tornado": "龙卷风",
            "TropicalStorm": "热带风暴",
            "Dust": "浮尘",
            "Fog": "雾",
            "Haze": "霾",
            "Smoke": "烟雾"
        };

        // 页面加载完成后初始化
        window.onload = () => {
            // 默认展示一个晴天背景
            updateBackground("Clear");
            getLocation();
            
            // 监听回车键提交心事
            document.getElementById('mind-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitMind();
                }
            });
        };

        // 1. 获取用户地理位置
        function getLocation() {
            window.hasLoadedData = false;
            // 首先检查是否在 HTTP 环境下运行
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const isHttps = window.location.protocol === 'https:';
            
            if (!isHttps && !isLocalhost) {
                console.warn("地理位置 API 需要 HTTPS 环境");
                handleLocationError();
                return;
            }

            if (navigator.geolocation) {
                const locationTimeout = setTimeout(() => {
                    console.warn("地理位置获取超时保护触发");
                    handleLocationError();
                }, 5000);

                navigator.geolocation.getCurrentPosition(
                    position => {
                        clearTimeout(locationTimeout);
                        if (window.hasLoadedData) return;
                        window.hasLoadedData = true;
                        
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        getCityName(lat, lon);
                        getWeatherData(lat, lon);
                    },
                    error => {
                        clearTimeout(locationTimeout);
                        console.warn("地理位置获取失败:", error.message);
                        handleLocationError();
                    },
                    { 
                        enableHighAccuracy: false,
                        timeout: 5000, 
                        maximumAge: 60000 
                    }
                );
            } else {
                console.warn("浏览器不支持地理位置");
                handleLocationError();
            }
        }
        
        // 处理定位失败的降级逻辑
        function handleLocationError() {
            // 降级使用北京坐标
            const defaultLat = 39.9042;
            const defaultLon = 116.4074;
            if (window.hasLoadedData) return;
            window.hasLoadedData = true;
            
            document.getElementById('loc-text').innerText = "北京市";
            getWeatherData(defaultLat, defaultLon);
        }

        // 2. 通过经纬度反查城市名称
        async function getCityName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`, {
                    headers: { 
                        'Accept-Language': 'zh-CN',
                    }
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();
                if (data && data.address) {
                    const city = data.address.city || data.address.town || data.address.county || "未知城市";
                    const district = data.address.suburb || data.address.district || "";
                    document.getElementById('loc-text').innerText = district ? `${city} ${district}` : city;
                } else {
                    document.getElementById('loc-text').innerText = "未知位置";
                }
            } catch (e) {
                console.error("反查城市失败", e);
                document.getElementById('loc-text').innerText = "未知位置";
            }
        }

        // 3. 调用后端接口获取 WeatherKit 数据
        const API_BASE_URL = ""; 
        
        async function getWeatherData(lat, lon) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/weather?lat=${lat}&lon=${lon}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                if (data.currentWeather && data.forecastDaily) {
                    renderRealtimeUI(data.currentWeather);
                    updateBackground(data.currentWeather.conditionCode);
                    renderForecastUI(data.forecastDaily);
                } else {
                    throw new Error("Invalid WeatherKit data format");
                }
            } catch (error) {
                console.error("获取天气数据失败:", error);
                document.getElementById('weather-desc').innerText = "服务暂不可用";
                renderMockForecastUI();
            }
        }

        // 渲染实时天气 UI
        function renderRealtimeUI(currentWeather) {
            document.getElementById('temp-val').innerText = Math.round(currentWeather.temperature);
            document.getElementById('weather-desc').innerText = weatherKitMap[currentWeather.conditionCode] || "未知";
            
            // 生活指数 (体感温度替代舒适度描述)
            const apparentTemp = Math.round(currentWeather.temperatureApparent);
            document.getElementById('idx-comfort').innerText = `体感 ${apparentTemp}°`;
            document.getElementById('idx-uv').innerText = currentWeather.uvIndex || "--";
            document.getElementById('idx-humidity').innerText = Math.round(currentWeather.humidity * 100) + "%";
            document.getElementById('idx-wind').innerText = Math.round(currentWeather.windSpeed) + " km/h";
        }

        // 渲染未来三天预报 UI
        function renderForecastUI(forecastDaily) {
            const listContainer = document.getElementById('forecast-list');
            listContainer.innerHTML = "";
            const dayLabels = ["今天", "明天", "后天"];
            
            const days = forecastDaily.days || [];
            
            for (let i = 0; i < 3; i++) {
                if (!days[i]) break;
                
                const condition = days[i].conditionCode;
                const tempMin = Math.round(days[i].temperatureMin);
                const tempMax = Math.round(days[i].temperatureMax);
                // 取日期 MM-DD
                const dateStr = days[i].forecastStart.substring(5, 10); 
                
                const html = `
                    <div class="forecast-item">
                        <div class="forecast-date">${dayLabels[i]} <span style="font-size:0.8em; opacity:0.7; margin-left:5px;">${dateStr}</span></div>
                        <div class="forecast-weather">${weatherKitMap[condition] || "未知"}</div>
                        <div class="forecast-temp">${tempMin}° ~ ${tempMax}°</div>
                    </div>
                `;
                listContainer.innerHTML += html;
            }
        }

        // Mock 预报数据（兜底）
        function renderMockForecastUI() {
            const listContainer = document.getElementById('forecast-list');
            listContainer.innerHTML = `
                <div class="forecast-item"><div class="forecast-date">今天</div><div class="forecast-weather">多云</div><div class="forecast-temp">15° ~ 22°</div></div>
                <div class="forecast-item"><div class="forecast-date">明天</div><div class="forecast-weather">晴</div><div class="forecast-temp">18° ~ 25°</div></div>
                <div class="forecast-item"><div class="forecast-date">后天</div><div class="forecast-weather">小雨</div><div class="forecast-temp">14° ~ 19°</div></div>
            `;
        }

        // 4. 根据天气和时间更新动态背景
        function updateBackground(conditionCode) {
            const hour = new Date().getHours();
            const bgLayer = document.getElementById('bg-layer');
            const lightningLayer = document.getElementById('lightning-layer');
            
            // 清空之前的特效
            bgLayer.innerHTML = ""; 
            lightningLayer.style.animation = "";
            
            let bgGradient = "";
            let isNight = false;
            
            // 判断时间段 (中午/白天、傍晚、深夜)
            if (hour >= 6 && hour < 17) {
                // 白天 (清晨到下午)
                bgGradient = "linear-gradient(135deg, #4A90E2, #87CEEB)";
            } else if (hour >= 17 && hour < 19) {
                // 傍晚 (黄昏)
                bgGradient = "linear-gradient(135deg, #FF7E5F, #FEB47B)";
            } else {
                // 深夜
                bgGradient = "linear-gradient(135deg, #0f2027, #203a43)";
                isNight = true;
            }
            bgLayer.style.background = bgGradient;
            
            // 归类天气现象
            const isClear = ["Clear", "MostlyClear", "Hot"].includes(conditionCode);
            const isCloudy = ["Cloudy", "MostlyCloudy", "PartlyCloudy", "Fog", "Haze", "Smoke", "Dust", "Breezy", "Windy"].includes(conditionCode);
            const isRain = ["Drizzle", "HeavyRain", "Rain", "Showers", "MixedRainFall", "FreezingDrizzle", "FreezingRain"].includes(conditionCode);
            const isSnow = ["Flurries", "HeavySnow", "Snow", "SnowShowers", "Blizzard", "BlowingSnow", "Sleet", "MixedRainAndSleet", "MixedRainAndSnow", "MixedSnowAndSleet", "ScatteredSnowShowers", "Hail"].includes(conditionCode);
            const isThunder = ["IsolatedThunderstorms", "SevereThunderstorm", "Thunderstorm", "ScatteredThunderstorms", "Tornado", "TropicalStorm", "Hurricane"].includes(conditionCode);
            
            // 渲染具体天气特效
            if (isClear) {
                // 晴天
                if (!isNight) {
                    bgLayer.innerHTML += `<div class="sun"></div>`;
                } else {
                    bgLayer.innerHTML += `<div class="moon"></div>`;
                    // 添加星星
                    for(let i = 0; i < 40; i++) {
                        const x = Math.random() * 100;
                        const y = Math.random() * 60; // 星星主要在上半部分
                        const delay = Math.random() * 3;
                        const size = Math.random() * 2 + 1;
                        bgLayer.innerHTML += `<div class="star" style="top:${y}%; left:${x}%; width:${size}px; height:${size}px; animation: pulse 2s infinite alternate ${delay}s;"></div>`;
                    }
                }
            } 
            else if (isCloudy || (!isClear && !isRain && !isSnow && !isThunder)) {
                // 多云 / 阴天
                // 如果是阴天，背景稍微变灰暗
                if (conditionCode === "Cloudy" && !isNight) {
                    bgLayer.style.background = "linear-gradient(135deg, #606c88, #3f4c6b)";
                }
                for(let i = 0; i < 6; i++) {
                    const top = 5 + Math.random() * 30;
                    const delay = Math.random() * -20;
                    const duration = 20 + Math.random() * 15;
                    const scale = 0.6 + Math.random() * 0.8;
                    const opacity = isNight ? 0.2 : 0.6;
                    bgLayer.innerHTML += `
                        <div class="cloud" style="top:${top}%; left:-30%; width:150px; height:50px; background:rgba(255,255,255,${opacity}); transform:scale(${scale}); animation: float ${duration}s linear infinite ${delay}s;"></div>
                    `;
                }
            }
            
            if (isRain || isThunder) {
                // 雨天 (涵盖所有雨)
                if (!isNight) {
                    bgLayer.style.background = "linear-gradient(135deg, #4b6cb7, #182848)";
                }
                // 雨滴
                for(let i = 0; i < 80; i++) {
                    const left = Math.random() * 100;
                    const delay = Math.random() * 2;
                    const duration = 0.4 + Math.random() * 0.4;
                    bgLayer.innerHTML += `
                        <div style="position:absolute; top:-20px; left:${left}%; width:2px; height:20px; background:rgba(255,255,255,0.5); animation: fall ${duration}s linear infinite ${delay}s;"></div>
                    `;
                }
                // 雷雨天气触发闪电
                if (isThunder) {
                    lightningLayer.style.animation = "flash 6s infinite";
                }
            }
            
            if (isSnow) {
                // 雪天
                for(let i = 0; i < 60; i++) {
                    const left = Math.random() * 100;
                    const delay = Math.random() * 5;
                    const duration = 3 + Math.random() * 4;
                    const size = 3 + Math.random() * 4;
                    bgLayer.innerHTML += `
                        <div style="position:absolute; top:-20px; left:${left}%; width:${size}px; height:${size}px; background:#ffffff; border-radius:50%; filter:blur(1px); animation: fall ${duration}s linear infinite ${delay}s;"></div>
                    `;
                }
            }
        }

        // 5. 弹窗控制逻辑
        function openModal() {
            document.getElementById('forecast-modal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('forecast-modal').classList.remove('show');
        }
        // 点击弹窗外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('forecast-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // 6. 心事提交与动画
        let isSubmitting = false;
        function submitMind() {
            if (isSubmitting) return;
            const input = document.getElementById('mind-input');
            const text = input.value.trim();
            if (!text) return; // 为空不提交
            
            isSubmitting = true;
            const icon = document.getElementById('plane-icon');
            // 添加飞走动画类
            icon.classList.add('fly');
            
            // 动画执行结束后处理
            setTimeout(() => {
                showToast("树洞听到啦");
                input.value = "";
                // 移除动画类，恢复原位
                icon.classList.remove('fly');
                isSubmitting = false;
            }, 1000);
        }
        
        // 展现 Toast 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
